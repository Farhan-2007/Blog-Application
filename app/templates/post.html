{% extends "layout.html"%}
{% block content %}

<article class="media content-section">
    <img class="rounded-circle post-avatar"
        src="{{ url_for('static', filename='profile_pics/' + post.author.image_file) }}">
    <div class="media-body">
        <div class="article-metadata">
            <div class="author-block">
                <a class="author-name" href="{{ url_for('user_posts', username = post.author.username ) }}">{{ post.author.username }}</a>
                <small class="text-muted d-block">
                    {{ post.date_posted.strftime('%Y-%m-%d') }}
                </small>
                {% if post.author == current_user %}
                <div>
                    <a type = "button" class = "btn btn-secondary btn-sm mt-1 mb-1" href="{{ url_for('update_post', post_id = post.id) }}">Update</a>
                    <button type="button" class="btn btn-danger btn-sm m-1" data-bs-toggle="modal" 
                    data-bs-target="#deleteModal">Delete</button>
                </div>
                {% endif %}
            </div>
        </div>
        <h2 class="article-title"> <a href="{{ url_for('post', post_id = post.id)}}">{{ post.title }}</a></h2>
        <p class="article-content">{{ post.content }}</p>
    </div>
</article>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="deleteModalLabel">Delete Post?</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form action = "{{ url_for('delete_post', post_id = post.id) }}" method = "POST">
                    <input class = "btn btn-danger" type = "submit" value = "Delete">
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
